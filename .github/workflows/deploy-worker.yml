name: Deploy Worker

on:
  push:
    branches: [claude/atlas-app-dev-sfd12k]
    paths: [worker/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: worker
          command: d1 execute festival-atlas-vault --remote --file=schema.sql
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: worker
