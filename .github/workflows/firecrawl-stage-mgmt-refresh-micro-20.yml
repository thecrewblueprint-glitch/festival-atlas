name: Firecrawl Stage Management Refresh Micro 20 Sweep

on:
  push:
    branches:
      - research-version
    paths:
      - 'research/firecrawl-run-control.json'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  stage-mgmt-refresh-micro-20:
    name: Stage Management refresh micro 20 sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      MAX_TOTAL_CREDITS: '20'
      MAX_SEARCH_RESULTS: '1'
      OUTPUT_DIR: firecrawl-output-stage-mgmt-refresh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/firecrawl-stage-mgmt-refresh-runner.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-stage-mgmt-refresh-micro-20
          path: firecrawl-output-stage-mgmt-refresh/
          if-no-files-found: warn
          retention-days: 7
