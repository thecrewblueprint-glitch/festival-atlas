name: Validate branch research packages

on:
  push:
    branches:
      - research-version
  pull_request:
    branches:
      - research-version
      - main

jobs:
  validate-branch-research:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package syntax and required fields
        run: npm run validate:branch-research
