name: Deploy Site to GitHub Pages

on:
  push:
    branches: [research-version]
    paths-ignore:
      - worker/**
      - .github/**
      - handoffs/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research-version
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
