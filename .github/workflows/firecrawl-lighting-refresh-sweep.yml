name: Firecrawl Lighting Refresh Sweep

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lighting-refresh-sweep:
    name: Lighting refresh sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      MAX_TOTAL_CREDITS: '10'
      MAX_SEARCH_RESULTS: '1'
      MAX_SCRAPES_PER_TARGET: '0'
      REQUEST_DELAY_MS: '1250'
      OUTPUT_DIR: firecrawl-output-lighting-refresh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Confirm Firecrawl key is available
        run: |
          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "Missing Firecrawl key."
            exit 1
          fi
          echo "Firecrawl key is available."

      - name: Run Lighting refresh sweep in search-only micro mode
        run: node tools/firecrawl-lighting-refresh-sweep.js

      - name: Upload Lighting refresh artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-lighting-refresh
          path: firecrawl-output-lighting-refresh/
          if-no-files-found: warn
          retention-days: 7
