name: Firecrawl Backline Low-Mode Sweep

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  backline-low-sweep:
    name: Backline low-mode sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      MAX_TOTAL_CREDITS: '10'
      MAX_SEARCH_RESULTS: '1'
      MAX_SCRAPES_PER_TARGET: '0'
      REQUEST_DELAY_MS: '1250'
      OUTPUT_DIR: firecrawl-output-backline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Confirm Firecrawl secret is available
        run: |
          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "Missing Firecrawl secret."
            exit 1
          fi
          echo "Firecrawl secret is available."

      - name: Run Backline low-mode sweep in search-only micro mode
        run: node tools/firecrawl-backline-low-sweep.js

      - name: Upload Backline research artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-low-sweep-backline
          path: firecrawl-output-backline/
          if-no-files-found: warn
          retention-days: 7
