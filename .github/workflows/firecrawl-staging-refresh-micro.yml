name: Firecrawl Staging Refresh Micro Sweep

on:
  push:
    branches:
      - research-version
    paths:
      - 'research/firecrawl-run-control.json'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  staging-refresh-micro:
    name: Staging refresh micro sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      DEPARTMENT: staging
      MAX_TOTAL_CREDITS: '10'
      MAX_SEARCH_RESULTS: '1'
      MAX_SCRAPES_PER_TARGET: '0'
      OUTPUT_DIR: firecrawl-output-staging-refresh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/firecrawl-department-refresh-runner.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-staging-refresh-micro
          path: firecrawl-output-staging-refresh/
          if-no-files-found: warn
          retention-days: 7
