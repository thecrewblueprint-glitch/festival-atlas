name: Firecrawl Audio Refresh Micro Sweep

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  audio-refresh-micro:
    name: Audio refresh micro sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      DEPARTMENT: audio
      MAX_TOTAL_CREDITS: '10'
      MAX_SEARCH_RESULTS: '1'
      MAX_SCRAPES_PER_TARGET: '0'
      REQUEST_DELAY_MS: '1250'
      OUTPUT_DIR: firecrawl-output-audio-refresh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Audio refresh micro sweep
        run: node tools/firecrawl-department-refresh-runner.js

      - name: Upload Audio refresh artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-audio-refresh-micro
          path: firecrawl-output-audio-refresh/
          if-no-files-found: warn
          retention-days: 7
