name: Firecrawl API Smoke Test

on:
  push:
    branches:
      - research-version
    paths:
      - '.github/workflows/firecrawl-smoke-test.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  smoke-test:
    name: Firecrawl secret and API check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
    steps:
      - name: Confirm secret exists
        run: |
          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "FIRECRAWL_API_KEY secret is missing."
            exit 1
          fi
          echo "FIRECRAWL_API_KEY secret is present."

      - name: Run one low-credit Firecrawl search
        run: |
          mkdir -p firecrawl-smoke-test
          node <<'NODE'
          const fs = require('fs');

          async function main() {
            const res = await fetch('https://api.firecrawl.dev/v2/search', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.FIRECRAWL_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                query: 'Production Atlas GitHub Pages static site',
                limit: 1,
                sources: [{ type: 'web' }],
                country: 'US'
              })
            });

            const text = await res.text();
            let body;
            try {
              body = JSON.parse(text);
            } catch (error) {
              body = { parseError: error.message, raw: text.slice(0, 1000) };
            }

            const safe = {
              ok: res.ok,
              status: res.status,
              statusText: res.statusText,
              success: body.success,
              creditsUsed: body.creditsUsed ?? null,
              hasData: Boolean(body.data),
              resultCount: Array.isArray(body.data?.web) ? body.data.web.length : Array.isArray(body.web) ? body.web.length : 0,
              error: body.error || body.message || null,
              checkedAt: new Date().toISOString()
            };

            fs.writeFileSync('firecrawl-smoke-test/result.json', JSON.stringify(safe, null, 2));
            fs.writeFileSync('firecrawl-smoke-test/result.md', `# Firecrawl API Smoke Test\n\n\`\`\`json\n${JSON.stringify(safe, null, 2)}\n\`\`\`\n`);

            console.log(JSON.stringify(safe, null, 2));

            if (!res.ok || body.success === false) {
              process.exit(1);
            }
          }

          main().catch(error => {
            fs.mkdirSync('firecrawl-smoke-test', { recursive: true });
            fs.writeFileSync('firecrawl-smoke-test/error.txt', error.stack || error.message);
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload smoke test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-smoke-test-result
          path: firecrawl-smoke-test/
          if-no-files-found: warn
          retention-days: 3
