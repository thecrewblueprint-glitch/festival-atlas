name: Firecrawl Video LED Refresh Micro Sweep

on:
  push:
    branches:
      - research-version
    paths:
      - 'research/firecrawl-run-control.json'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  video-led-refresh-micro:
    name: Video LED refresh micro sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      DEPARTMENT: video-led
      MAX_TOTAL_CREDITS: '10'
      MAX_SEARCH_RESULTS: '1'
      MAX_SCRAPES_PER_TARGET: '0'
      REQUEST_DELAY_MS: '1250'
      OUTPUT_DIR: firecrawl-output-video-led-refresh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Video LED refresh micro sweep
        run: node tools/firecrawl-department-refresh-runner.js

      - name: Upload Video LED refresh artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firecrawl-video-led-refresh-micro
          path: firecrawl-output-video-led-refresh/
          if-no-files-found: warn
          retention-days: 7
